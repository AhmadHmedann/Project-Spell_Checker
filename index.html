<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script type="module" src="script.mjs"></script>
  <title>Spell Checker</title>
</head>
<body>
  <label for="spell-input">Enter a text to check</label>
  <textarea name="spell-input" id="spell-input" placeholder="Type your text here..." rows="6" cols="50"></textarea>
  <button type="button" id="check-spelling">Check Spelling</button>
  <div id="spell-results" aria-live="polite"></div>
</body>
</html>
